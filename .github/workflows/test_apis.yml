name: Test APIs

on:
    push:
        branches: [main, dev]
        paths:
        - "household_battery/api/**"
        - "artifacts/**"
        - "tests/test_api_routes.py"
        - "tests/test_api_parity_from_files.py"

jobs:
    test_apis:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install glpk
              run: |
                sudo apt-get update
                sudo apt-get install -y glpk-utils

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version-file: '.python-version'

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Install the project for testing
              run: uv sync

            - name: Run tests
              run: |
                source .venv/bin/activate
                pytest tests/test_api_routes.py -v -s
                pytest tests/test_api_parity_from_files.py -v -s